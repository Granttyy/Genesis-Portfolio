services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    # ✅ Name the image for easier management
    image: genesisportfolio-server:latest
    container_name: portfolio-app
    restart: always
    environment:
      - NODE_ENV=production
      # List your EmailJS keys here if you want to override the .env file
      - NEXT_PUBLIC_EMAILJS_SERVICE_ID=${NEXT_PUBLIC_EMAILJS_SERVICE_ID}
      - NEXT_PUBLIC_EMAILJS_TEMPLATE_ID=${NEXT_PUBLIC_EMAILJS_TEMPLATE_ID}
      - NEXT_PUBLIC_EMAILJS_PUBLIC_KEY=${NEXT_PUBLIC_EMAILJS_PUBLIC_KEY}
    # Load environment variables from .env file
    env_file:
      - .env
    ports:
      - "3000:3000"
    # Optional: Healthcheck to ensure your Node server is actually responding
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3